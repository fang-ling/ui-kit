<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    @font-face {
      font-family: "UIKit SF Pro";
      src: url("/Resources/Assets/Fonts/SF-Pro.ttf") format("truetype");
    }

    :root {
      color-scheme: light dark;
    }

    .view {
      position: absolute;
      box-sizing: border-box;
    }

    .sfSymbol {
      font-family: "UIKit SF Pro";
    }

    body {
      background: white;
      position: relative;
      margin: 0px;
    }

    button {
      padding: 0px;
      border: 0px;
      background-color: transparent;
    }

    p {
      margin: 0px;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: black;
      }
    }
  </style>
</head>

<body>
  <script type="module">
    import {
      WASI,
      OpenFile,
      File,
      ConsoleStdout
    } from "/Resources/Assets/JavaScripts/WASIShims.js"
    import {
      JavaScriptCoreInitialize,
      JavaScriptCoreWindowGetWidth,
      JavaScriptCoreWindowGetHeight,
      JavaScriptCoreNodeInitializeButtonNode,
      JavaScriptCoreNodeInitializeDivisionNode,
      JavaScriptCoreNodeInitializeParagraphNode,
      JavaScriptCoreNodeInitializeSpanNode,
      //JavaScriptBridge_MeasureTextSize,
      JavaScriptCoreNodeAddClickEventListener,
      JavaScriptCoreNodeAddSubnode,
      JavaScriptCoreNodeUpdateClassName,
      JavaScriptCoreNodeUpdateStyleProperty,
      JavaScriptCoreNodeUpdateTextContent
    } from "/Resources/Assets/JavaScripts/JavaScriptCoreKit.js"

    const wasi = new WASI(
      [],
      [],
      [
        new OpenFile(new File([])),
        ConsoleStdout.lineBuffered(msg => console.log(`[WASI stdout] ${msg}`)),
        ConsoleStdout.lineBuffered(msg => console.warn(`[WASI stderr] ${msg}`))
      ]
    )

    const memory = new WebAssembly.Memory({
      initial: 587,
      maximum: 16384,
      shared: true
    })
    const { instance } = await WebAssembly.instantiateStreaming(
      fetch("/Examples/.build/release/UIKitExample.wasm"),
      {
        wasi_snapshot_preview1: wasi.wasiImport,
        env: {
          memory,
          swift_addNewDSOImage: () => {},
          JavaScriptCoreWindowGetWidth,
          JavaScriptCoreWindowGetHeight,
          JavaScriptCoreNodeInitializeButtonNode,
          JavaScriptCoreNodeInitializeDivisionNode,
          JavaScriptCoreNodeInitializeParagraphNode,
          JavaScriptCoreNodeInitializeSpanNode,
          //JavaScriptBridge_MeasureTextSize,
          JavaScriptCoreNodeAddClickEventListener,
          JavaScriptCoreNodeAddSubnode,
          JavaScriptCoreNodeUpdateClassName,
          JavaScriptCoreNodeUpdateStyleProperty,
          JavaScriptCoreNodeUpdateTextContent
        }
      }
    )
    wasi.initialize(instance)

    JavaScriptCoreInitialize(instance, memory)

    instance.exports.main()
  </script>
</body>
