<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    .view {
      position: absolute;
      box-sizing: border-box;
    }

    body {
      background: black;
      position: relative;
    }
  </style>
</head>

<body>
  <script type="module">
    import {
      WASI,
      OpenFile,
      File,
      ConsoleStdout
    } from "/Resources/WASIShims.js"
    import {
      UIFramework_JavaScriptBridge
    } from "/Resources/UIJavaScriptBridge.js"

    const wasi = new WASI(
      [],
      [],
      [
        new OpenFile(new File([])),
        ConsoleStdout.lineBuffered(msg => console.log(`[WASI stdout] ${msg}`)),
        ConsoleStdout.lineBuffered(msg => console.warn(`[WASI stderr] ${msg}`))
      ]
    )

    const memory = new WebAssembly.Memory({
      initial: 587,
      maximum: 16384,
      shared: true
    })
    const { instance } = await WebAssembly.instantiateStreaming(
      fetch("/.build/release/UIFrameworkExample.wasm"),
      {
        wasi_snapshot_preview1: wasi.wasiImport,
        env: {
          memory,
          /*UIJavaScriptBridge_HTMLElement_UpdateText: (id, text, textCount) => {
            UIJavaScriptBridge.updateElementText(id, text, textCount)
          },*/
          UIFramework_JavaScriptBridge_InitializeElement: (
            elementType,
            id,
            idCount
          ) => {
            UIFramework_JavaScriptBridge.initializeElement(
              elementType,
              id,
              idCount
            )
          },
          UIFramework_JavaScriptBridge_LinkElements: (
            id,
            idCount,
            parentID,
            parentIDCount
          ) => {
            UIFramework_JavaScriptBridge.linkElements(
              id,
              idCount,
              parentID,
              parentIDCount
            )
          },
          UIFramework_JavaScriptBridge_GetWindowWidth: () => {
            return UIFramework_JavaScriptBridge.getWindowWidth()
          },
          UIFramework_JavaScriptBridge_GetWindowHeight: () => {
            return UIFramework_JavaScriptBridge.getWindowHeight()
          },
          UIFramework_JavaScriptBridge_SetElementStyleProperty: (
            id,
            idCount,
            property,
            propertyCount,
            value,
            valueCount
          ) => {
            UIFramework_JavaScriptBridge.setElementStyleProperty(
              id,
              idCount,
              property,
              propertyCount,
              value,
              valueCount
            )
          },
          UIFramework_JavaScriptBridge_RemoveElementStyleProperty: (
            id,
            idCount,
            property,
            propertyCount
          ) => {
            UIFramework_JavaScriptBridge.removeElementStyleProperty(
              id,
              idCount,
              property,
              propertyCount
            )
          }
          /*UIJavaScriptBridge_HTMLElement_AddEventListener: (
            htmlEventType,
            id
          ) => {
            UIJavaScriptBridge.addEventListener(htmlEventType, id)
          }*/
        }
      }
    )
    wasi.initialize(instance)

    UIFramework_JavaScriptBridge.initialize(instance, memory)

    instance.exports.__main_argc_argv()
  </script>
</body>
