<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    .view {
      position: absolute;
      box-sizing: border-box;
    }

    body {
      background: black;
      position: relative;
      margin: 0px;
    }
  </style>
</head>

<body>
  <script type="module">
    import {
      WASI,
      OpenFile,
      File,
      ConsoleStdout
    } from "/Resources/WASIShims.js"
    import {
      JavaScriptBridge_Initialize,
      JavaScriptBridge_InitializeElement,
      JavaScriptBridge_GetWindowWidth,
      JavaScriptBridge_GetWindowHeight,
      JavaScriptBridge_SetElementStyleProperty,
      JavaScriptBridge_RemoveElementStyleProperty,
      JavaScriptBridge_LinkElements
    } from "/Resources/JavaScriptBridge.js"

    const wasi = new WASI(
      [],
      [],
      [
        new OpenFile(new File([])),
        ConsoleStdout.lineBuffered(msg => console.log(`[WASI stdout] ${msg}`)),
        ConsoleStdout.lineBuffered(msg => console.warn(`[WASI stderr] ${msg}`))
      ]
    )

    const memory = new WebAssembly.Memory({
      initial: 587,
      maximum: 16384,
      shared: true
    })
    const { instance } = await WebAssembly.instantiateStreaming(
      fetch("/.build/release/UIFrameworkExample.wasm"),
      {
        wasi_snapshot_preview1: wasi.wasiImport,
        env: {
          memory,
          /*UIJavaScriptBridge_HTMLElement_UpdateText: (id, text, textCount) => {
            UIJavaScriptBridge.updateElementText(id, text, textCount)
          },*/
          JavaScriptBridge_InitializeElement,
          JavaScriptBridge_GetWindowWidth,
          JavaScriptBridge_GetWindowHeight,
          JavaScriptBridge_SetElementStyleProperty,
          JavaScriptBridge_RemoveElementStyleProperty,
          JavaScriptBridge_LinkElements
          /*UIJavaScriptBridge_HTMLElement_AddEventListener: (
            htmlEventType,
            id
          ) => {
            UIJavaScriptBridge.addEventListener(htmlEventType, id)
          }*/
        }
      }
    )
    wasi.initialize(instance)

    JavaScriptBridge_Initialize(instance, memory)

    instance.exports.__main_argc_argv()
  </script>
</body>
